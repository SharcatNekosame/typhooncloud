<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時颱風動態地圖 (含展示模式)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .legend {
            background: white; padding: 15px; line-height: 1.5em;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; max-width: 250px;
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
        .status-badge {
            position: fixed; top: 10px; left: 60px; background: rgba(0,0,0,0.7); color: white;
            padding: 8px 15px; border-radius: 20px; font-size: 14px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="status" class="status-badge">正在連線中央氣象署...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([23.5, 122.0], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const apiKey = "CWA-BBE46FCC-A1BF-4EAC-A234-A68A5234042C";
        const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0034-001?Authorization=${apiKey}&format=JSON`;

        // 模擬的展示數據（當現在沒有真颱風時啟用）
        const demoTyphoon = {
            name: "測試展示颱風 (模擬路徑)",
            history: [
                { lat: 18.5, lng: 126.0, time: "07/08 08:00", info: "輕度颱風", pressure: 998, wind: 18 },
                { lat: 20.2, lng: 124.5, time: "07/08 20:00", info: "中度颱風", pressure: 965, wind: 35 },
                { lat: 22.0, lng: 123.0, time: "07/09 08:00", info: "中度颱風 (當前位置)", pressure: 950, wind: 40 }
            ],
            forecast: [
                { lat: 23.8, lng: 121.5, time: "07/09 20:00 (預估)", info: "強烈颱風 (準備登陸)", r7: 250 },
                { lat: 25.5, lng: 119.5, time: "07/10 20:00 (預估)", info: "輕度颱風 (強度減弱)", r7: 150 }
            ]
        };

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const tfs = data.records?.dataset?.typhoons?.typhoon;
                
                // 判斷氣象署有沒有活耀的颱風資料
                if (!tfs || tfs.length === 0) {
                    document.getElementById('status').innerHTML = "🟢 目前無即時警報，已切換至「歷史模擬展示模式」";
                    document.getElementById('status').style.background = "#28a745";
                    renderDemo(); // 啟用模擬資料
                } else {
                    document.getElementById('status').innerHTML = "🔴 偵測到即時颱風！正在繪製最新動態...";
                    document.getElementById('status').style.background = "#dc3545";
                    renderRealData(tfs); // 繪製真實資料
                }
            })
            .catch(error => {
                console.error("API 請求失敗，改為展示模式:", error);
                document.getElementById('status').innerHTML = "⚠️ API 連線異常，已切換至「歷史模擬展示模式」";
                renderDemo();
            });

        // 繪製真實颱風的函式
        function renderRealData(tfs) {
            tfs.forEach(tf => {
                const nameInfo = `${tf.typhoonName} (${tf.cwbTyphoonName || '未命名'})`;
                const historyCoords = [];

                if (tf.analysis?.fix) {
                    const fixes = Array.isArray(tf.analysis.fix) ? tf.analysis.fix : [tf.analysis.fix];
                    fixes.forEach(fix => {
                        const lat = parseFloat(fix.coordinate.split(',')[1]);
                        const lng = parseFloat(fix.coordinate.split(',')[0]);
                        historyCoords.push([lat, lng]);

                        L.circleMarker([lat, lng], { radius: 5, fillColor: '#007bff', color: '#fff', weight: 1, fillOpacity: 0.8 }).addTo(map)
                         .bindPopup(`<b>🌀 ${nameInfo}</b><br>⏱️ ${fix.fixTime}<br>🎯 中心氣壓: ${fix.pressure} hPa<br>💨 最大風速: ${fix.maxWindSpeed} m/s`);
                    });
                    L.polyline(historyCoords, { color: '#007bff', weight: 3 }).addTo(map);
                }

                if (tf.forecast?.forecastPosition) {
                    const forecasts = Array.isArray(tf.forecast.forecastPosition) ? tf.forecast.forecastPosition : [tf.forecast.forecastPosition];
                    const forecastCoords = historyCoords.length > 0 ? [historyCoords[historyCoords.length - 1]] : [];

                    forecasts.forEach(fc => {
                        const lat = parseFloat(fc.coordinate.split(',')[1]);
                        const lng = parseFloat(fc.coordinate.split(',')[0]);
                        const r7 = fc.circle7 ? parseFloat(fc.circle7.radius) * 1000 : 0;
                        forecastCoords.push([lat, lng]);

                        L.circleMarker([lat, lng], { radius: 6, fillColor: '#dc3545', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(map)
                         .bindPopup(`<b>🔮 預報：${nameInfo}</b><br>⏱️ ${fc.forecastTime}<br>🌀 七級風半徑: ${fc.circle7 ? fc.circle7.radius : 0} 公里`);

                        if (r7 > 0) {
                            L.circle([lat, lng], { radius: r7, color: '#dc3545', weight: 1, fillColor: '#dc3545', fillOpacity: 0.1 }).addTo(map);
                        }
                    });
                    L.polyline(forecastCoords, { color: '#dc3545', weight: 3, dashArray: '5, 10' }).addTo(map);
                }
                if(historyCoords.length > 0) map.setView(historyCoords[historyCoords.length - 1], 5);
            });
        }

        // 繪製模擬展示颱風的函式
        function renderDemo() {
            const historyCoords = demoTyphoon.history.map(p => {
                L.circleMarker([p.lat, p.lng], { radius: 5, fillColor: '#007bff', color: '#fff', weight: 1, fillOpacity: 0.8 }).addTo(map)
                 .bindPopup(`<b>🌀 ${demoTyphoon.name}</b><br>⏱️ ${p.time}<br>🎯 中心氣壓: ${p.pressure} hPa<br>💨 最大風速: ${p.wind} m/s`);
                return [p.lat, p.lng];
            });
            L.polyline(historyCoords, { color: '#007bff', weight: 3 }).addTo(map);

            const forecastCoords = [historyCoords[historyCoords.length - 1]];
            demoTyphoon.forecast.forEach(p => {
                forecastCoords.push([p.lat, p.lng]);
                L.circleMarker([p.lat, p.lng], { radius: 6, fillColor: '#dc3545', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(map)
                 .bindPopup(`<b>🔮 ${demoTyphoon.name}</b><br>⏱️ ${p.time}<br>⚠️ 狀態: ${p.info}<br>🌀 預估暴風半徑: ${p.r7} 公里`);
                
                L.circle([p.lat, p.lng], { radius: p.r7 * 1000, color: '#dc3545', weight: 1, fillColor: '#dc3545', fillOpacity: 0.1 }).addTo(map);
            });
            L.polyline(forecastCoords, { color: '#dc3545', weight: 3, dashArray: '5, 10' }).addTo(map);
            
            map.setView([22.0, 123.0], 6); // 視角切到台灣附近
        }

        // 圖例
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>颱風路徑圖例</h4>';
            div.innerHTML += '<i style="background: #007bff; border-radius:50%"></i> 歷史定位點<br>';
            div.innerHTML += '<i style="border-top: 2px solid #007bff; height:0; width:18px; margin-top:8px"></i> 歷史行徑路線<br>';
            div.innerHTML += '<i style="background: #dc3545; border-radius:50%"></i> 預測路徑點<br>';
            div.innerHTML += '<i style="border-top: 2px dashed #dc3545; height:0; width:18px; margin-top:8px"></i> 未來預估路線<br>';
            div.innerHTML += '<i style="background: rgba(220, 53, 69, 0.15); border: 1px solid #dc3545"></i> 預估七級風暴風圈<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
        legend.addTo(map);
    </script>
</body>
</html>
