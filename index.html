<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時颱風動態地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .legend {
            background: white; padding: 15px; line-height: 1.5em;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; max-width: 250px;
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
        .status-badge {
            position: fixed; top: 10px; left: 60px; background: rgba(0,0,0,0.7); color: white;
            padding: 8px 15px; border-radius: 20px; font-size: 14px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="status" class="status-badge">正在連線中央氣象署...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([23.5, 122.0], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const apiKey = "CWA-BBE46FCC-A1BF-4EAC-A234-A68A5234042C";
        const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0034-001?Authorization=${apiKey}&format=JSON`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                // 依據你提供的 JSON 結構精準解析
                let typhoonInfoArray = [];
                if (data.records && data.records.info && data.records.info.records && data.records.info.records.typhoon_info) {
                    typhoonInfoArray = data.records.info.records.typhoon_info;
                }

                if (!Array.isArray(typhoonInfoArray)) {
                    typhoonInfoArray = typhoonInfoArray ? [typhoonInfoArray] : [];
                }

                if (typhoonInfoArray.length === 0) {
                    document.getElementById('status').innerHTML = "🟢 目前無即時警報資料";
                    document.getElementById('status').style.background = "#28a745";
                    return;
                }

                document.getElementById('status').innerHTML = `🔴 偵測到即時颱風：最新動態已更新`;
                document.getElementById('status').style.background = "#dc3545";

                typhoonInfoArray.forEach(tf => {
                    const nameInfo = `${tf.typhoon_name} (${tf.cwa_typhoon_name || '未命名'})`;
                    
                    // 1. 解析當前/歷史定位 (analysis)
                    const historyCoords = [];
                    if (tf.analysis) {
                        const ani = tf.analysis;
                        if (ani.position) {
                            // 格式通常為 "18.70,129.00" -> [lat, lng]
                            const parts = ani.position.split(',');
                            const lat = parseFloat(parts[0]);
                            const lng = parseFloat(parts[1]);
                            
                            if (!isNaN(lat) && !isNaN(lng)) {
                                historyCoords.push([lat, lng]);
                                
                                L.circleMarker([lat, lng], { radius: 6, fillColor: '#007bff', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(map)
                                 .bindPopup(`<b>🌀 ${nameInfo} - 當前位置</b><br>⏱️ 時間：${ani.time || '即時'}<br>🎯 中心氣壓: ${ani.pressure || '--'} hPa<br>💨 最大風速: ${ani.max_winds || '--'} m/s`);
                            }
                        }
                    }

                    // 2. 解析未來預測路徑 (prediction)
                    if (tf.prediction) {
                        const predictions = Array.isArray(tf.prediction) ? tf.prediction : [tf.prediction];
                        const forecastCoords = historyCoords.length > 0 ? [historyCoords[historyCoords.length - 1]] : [];

                        predictions.forEach(pred => {
                            if (!pred.position) return;
                            const parts = pred.position.split(',');
                            const lat = parseFloat(parts[0]);
                            const lng = parseFloat(parts[1]);

                            if (!isNaN(lat) && !isNaN(lng)) {
                                forecastCoords.push([lat, lng]);

                                // 讀取七級風暴風半徑 (radius_of_15ms)
                                let r7 = 0;
                                if (pred.radius_of_15ms && pred.radius_of_15ms.value) {
                                    r7 = parseFloat(pred.radius_of_15ms.value); // 公里
                                } else if (tf.analysis && tf.analysis.radius_of_15ms && tf.analysis.radius_of_15ms.value) {
                                    r7 = parseFloat(tf.analysis.radius_of_15ms.value);
                                }

                                L.circleMarker([lat, lng], { radius: 5, fillColor: '#dc3545', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(map)
                                 .bindPopup(`<b>🔮 預報：${nameInfo}</b><br>⏱️ 預估時間: ${pred.time}<br>🌀 預估暴風半徑: ${r7} 公里`);

                                if (r7 > 0) {
                                    L.circle([lat, lng], { radius: r7 * 1000, color: '#dc3545', weight: 1, fillColor: '#dc3545', fillOpacity: 0.06 }).addTo(map);
                                }
                            }
                        });

                        if (forecastCoords.length > 1) {
                            L.polyline(forecastCoords, { color: '#dc3545', weight: 3, dashArray: '5, 10' }).addTo(map);
                        }
                    }

                    // 連線歷史觀測點（如果有多個點的話）
                    if (historyCoords.length > 1) {
                        L.polyline(historyCoords, { color: '#007bff', weight: 3 }).addTo(map);
                    }

                    // 自動將地圖視角移到颱風中心
                    if (historyCoords.length > 0) {
                        map.setView(historyCoords[0], 5);
                    }
                });
            })
            .catch(error => {
                console.error("資料解析出錯:", error);
                document.getElementById('status').innerHTML = "⚠️ 資料讀取失敗，請確認 API 狀態";
            });

        // 圖例
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>颱風路徑圖例</h4>';
            div.innerHTML += '<i style="background: #007bff; border-radius:50%"></i> 歷史/當前定位點<br>';
            div.innerHTML += '<i style="background: #dc3545; border-radius:50%"></i> 預測路徑點<br>';
            div.innerHTML += '<i style="border-top: 2px dashed #dc3545; height:0; width:18px; margin-top:8px"></i> 未來預估路線<br>';
            div.innerHTML += '<i style="background: rgba(220, 53, 69, 0.1); border: 1px solid #dc3545"></i> 預估七級風暴風圈<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
